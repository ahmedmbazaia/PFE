<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PFE Telemetry Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0f1a;
            color: #e0e6f0;
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(56, 120, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
        }

        header {
            padding: 32px 24px 0;
            max-width: 960px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: #7a8ba8;
            margin-top: 4px;
            font-size: 0.9rem;
        }

        .grid {
            max-width: 960px;
            margin: 24px auto;
            padding: 0 24px 48px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 14px;
            padding: 20px;
            backdrop-filter: blur(12px);
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: rgba(96, 165, 250, 0.25);
        }

        .card.wide {
            grid-column: 1 / -1;
        }

        .card-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #5b6b85;
            margin-bottom: 12px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .metric:last-child { border-bottom: none; }

        .metric-name {
            font-size: 0.85rem;
            color: #8a9bb5;
        }

        .metric-value {
            font-size: 1.1rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: #e0e6f0;
        }

        .metric-value.accent { color: #60a5fa; }
        .metric-value.warn   { color: #fbbf24; }
        .metric-value.good   { color: #34d399; }

        /* Status badge */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge.live {
            background: rgba(52, 211, 153, 0.12);
            color: #34d399;
        }

        .badge.offline {
            background: rgba(251, 191, 36, 0.12);
            color: #fbbf24;
        }

        .badge.error {
            background: rgba(248, 113, 113, 0.12);
            color: #f87171;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse-anim 2s infinite;
        }

        @keyframes pulse-anim {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .timestamp-text {
            font-size: 0.8rem;
            color: #5b6b85;
        }

        .empty-msg {
            text-align: center;
            padding: 48px 20px;
            color: #5b6b85;
            font-size: 0.95rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Optical Interferometry Telemetry</h1>
        <p>Live data from Telescope 2 — auto-refreshes every 2 seconds</p>
    </header>

    <div class="grid" id="dashboard">
        <div class="empty-msg">Connecting to station...</div>
    </div>

    <script>
        function fmt(val, decimals = 1) {
            if (val === null || val === undefined || val === "") return "\u2014";
            const n = Number(val);
            return isNaN(n) ? String(val) : n.toFixed(decimals);
        }

        function renderDashboard(payload) {
            const el = document.getElementById("dashboard");

            if (payload.status !== "ok" || !payload.data) {
                el.innerHTML = `
                    <div class="card wide">
                        <div class="status-bar">
                            <span class="badge offline"><span class="pulse"></span> Waiting for data</span>
                        </div>
                    </div>
                    <div class="empty-msg">No telemetry data yet. Make sure the station is running and logging to mission_log.csv.</div>
                `;
                return;
            }

            const d = payload.data;

            el.innerHTML = `
                <div class="card wide">
                    <div class="status-bar">
                        <span class="badge live"><span class="pulse"></span> Connected</span>
                        <span class="timestamp-text">Station: ${d.timestamp || "\u2014"}</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">Orientation (T2)</div>
                    <div class="metric">
                        <span class="metric-name">Pitch</span>
                        <span class="metric-value accent">${fmt(d.t2_pitch)}&deg;</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Roll</span>
                        <span class="metric-value accent">${fmt(d.t2_roll)}&deg;</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Yaw</span>
                        <span class="metric-value accent">${fmt(d.t2_yaw)}&deg;</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">Sensors (T2)</div>
                    <div class="metric">
                        <span class="metric-name">Light Intensity</span>
                        <span class="metric-value warn">${fmt(d.t2_light_intensity, 0)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Sky Distance</span>
                        <span class="metric-value">${fmt(d.t2_sky_distance_mm, 0)} mm</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Baseline Distance</span>
                        <span class="metric-value">${fmt(d.t2_baseline_distance_mm, 0)} mm</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">GPS (T2)</div>
                    <div class="metric">
                        <span class="metric-name">Latitude</span>
                        <span class="metric-value good">${fmt(d.t2_lat, 6)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Longitude</span>
                        <span class="metric-value good">${fmt(d.t2_lon, 6)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Altitude</span>
                        <span class="metric-value">${fmt(d.t2_altitude, 1)} m</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">Station GPS</div>
                    <div class="metric">
                        <span class="metric-name">Latitude</span>
                        <span class="metric-value good">${fmt(d.gps_lat, 6)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Longitude</span>
                        <span class="metric-value good">${fmt(d.gps_lon, 6)}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Altitude</span>
                        <span class="metric-value">${fmt(d.gps_altitude, 1)} m</span>
                    </div>
                </div>
            `;
        }

        async function refresh() {
            try {
                const res = await fetch("/api/latest");
                const payload = await res.json();
                renderDashboard(payload);
            } catch (err) {
                document.getElementById("dashboard").innerHTML = `
                    <div class="card wide">
                        <div class="status-bar">
                            <span class="badge error"><span class="pulse"></span> Connection error</span>
                        </div>
                    </div>
                    <div class="empty-msg">${err}</div>
                `;
            }
        }

        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
