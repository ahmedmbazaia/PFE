<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Telemetry Dashboard</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffaf2;
            --ink: #1d2a36;
            --accent: #0f766e;
            --muted: #667085;
            --line: #d7cfc1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 35%),
                radial-gradient(circle at bottom right, rgba(180, 83, 9, 0.12), transparent 30%),
                var(--bg);
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px 56px;
        }

        .hero {
            margin-bottom: 24px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(2rem, 4vw, 3.4rem);
            line-height: 1.05;
        }

        .subtitle {
            margin: 0;
            max-width: 60ch;
            color: var(--muted);
            font-size: 1.05rem;
        }

        .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 18px 60px rgba(29, 42, 54, 0.08);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.08);
            color: var(--accent);
            font-weight: 700;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }

        .meta {
            margin-bottom: 20px;
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px 10px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            vertical-align: top;
        }

        th {
            width: 34%;
        }

        .empty {
            margin: 0;
            color: var(--muted);
        }

        @media (max-width: 640px) {
            th,
            td {
                display: block;
                width: 100%;
                padding-left: 0;
                padding-right: 0;
            }

            tr {
                display: block;
                padding: 10px 0;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="hero">
            <h1>Telemetry Dashboard</h1>
            <p class="subtitle">Live view of the most recent telemetry from mission_log.csv. Auto-refreshes every 2 seconds.</p>
        </section>

        <section class="panel">
            <div id="status" class="status">
                <span class="dot"></span>
                <span>Waiting for data</span>
            </div>
            <div id="meta" class="meta">No packet received yet.</div>
            <div id="content">
                <p class="empty">Power on the TTGO sender and make sure the LoRa frequency matches the HAT receiver.</p>
            </div>
        </section>
    </main>

    <script>
        function formatValue(value) {
            if (value === null || value === undefined || value === "") {
                return "—";
            }
            if (typeof value === "object") {
                return JSON.stringify(value);
            }
            return String(value);
        }

        function renderTable(data) {
            const entries = Object.entries(data);
            if (!entries.length) {
                return '<p class="empty">No fields in the latest packet.</p>';
            }

            const rows = entries.map(([key, value]) => `
                <tr>
                    <th>${key}</th>
                    <td>${formatValue(value)}</td>
                </tr>
            `).join("");

            return `<table><tbody>${rows}</tbody></table>`;
        }

        async function refresh() {
            try {
                const response = await fetch("/api/latest");
                const payload = await response.json();

                const status = document.getElementById("status");
                const meta = document.getElementById("meta");
                const content = document.getElementById("content");

                if (payload.status === "ok") {
                    status.innerHTML = '<span class="dot"></span><span>Receiving data</span>';
                    meta.textContent = `Last packet received at ${payload.received_at}`;
                    content.innerHTML = renderTable(payload.data);
                } else {
                    status.innerHTML = '<span class="dot"></span><span>Waiting for data</span>';
                    meta.textContent = "No packet received yet.";
                    content.innerHTML = '<p class="empty">No telemetry data yet. Make sure mission_log.csv is being written by the station.</p>';
                }
            } catch (error) {
                document.getElementById("status").innerHTML = '<span class="dot"></span><span>Dashboard error</span>';
                document.getElementById("meta").textContent = "Could not load telemetry from the Flask server.";
                document.getElementById("content").innerHTML = `<p class="empty">${error}</p>`;
            }
        }

        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
