<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PFE Telemetry Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #d8dfe9;
            min-height: 100vh;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 36px 20px 60px;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 4px;
        }

        .sub { color: #5a6a82; font-size: 0.85rem; margin-bottom: 28px; }

        /* Status bar */
        .status-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #fbbf24;
            flex-shrink: 0;
        }

        .dot.live { background: #34d399; animation: blink 2s infinite; }
        .dot.err  { background: #f87171; }

        @keyframes blink {
            0%,100% { opacity: 1; } 50% { opacity: 0.35; }
        }

        .status-text { font-size: 0.82rem; color: #7a8ba8; }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 14px;
        }

        .card-title {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.1px;
            color: #4b5c75;
            margin-bottom: 14px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .row:last-child { border-bottom: none; }

        .label { font-size: 0.84rem; color: #7a8ba8; }

        .val {
            font-size: 1.05rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .val.blue   { color: #60a5fa; }
        .val.yellow { color: #fbbf24; }
        .val.green  { color: #34d399; }
        .val.dim    { color: #5a6a82; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Optical Interferometry Telemetry</h1>
        <p class="sub">Live data from Telescope 2 &mdash; refreshes every 2 s</p>

        <div class="status-row">
            <span class="dot" id="dot"></span>
            <span class="status-text" id="status-text">Connecting...</span>
        </div>

        <div id="cards">
            <div class="card">
                <div class="card-title">Waiting for data</div>
                <div class="row"><span class="label">No telemetry received yet.</span></div>
            </div>
        </div>
    </div>

    <script>
        function f(v, d) {
            if (v === null || v === undefined || v === "") return "\u2014";
            var n = Number(v);
            return isNaN(n) ? String(v) : n.toFixed(d);
        }

        async function refresh() {
            var dot = document.getElementById("dot");
            var stxt = document.getElementById("status-text");
            var cards = document.getElementById("cards");

            try {
                var res = await fetch("/api/latest");
                var p = await res.json();

                if (p.status !== "ok" || !p.data || Object.keys(p.data).length === 0) {
                    dot.className = "dot";
                    stxt.textContent = "Waiting for data...";
                    cards.innerHTML =
                        '<div class="card">' +
                        '<div class="card-title">No data</div>' +
                        '<div class="row"><span class="label">Station is not logging yet.</span></div>' +
                        '</div>';
                    return;
                }

                var d = p.data;
                dot.className = "dot live";
                stxt.textContent = "Live \u2014 RPi: " + (d.rpi_timestamp || d.timestamp || "\u2014");

                cards.innerHTML =
                    '<div class="card">' +
                        '<div class="card-title">T2 Orientation</div>' +
                        '<div class="row"><span class="label">Pitch</span><span class="val blue">' + f(d.t2_pitch,2) + '&deg;</span></div>' +
                        '<div class="row"><span class="label">Roll</span><span class="val blue">' + f(d.t2_roll,2) + '&deg;</span></div>' +
                        '<div class="row"><span class="label">Yaw</span><span class="val blue">' + f(d.t2_yaw,2) + '&deg;</span></div>' +
                    '</div>' +

                    '<div class="card">' +
                        '<div class="card-title">T2 Sensors</div>' +
                        '<div class="row"><span class="label">Light Intensity</span><span class="val yellow">' + f(d.t2_light_intensity,0) + '</span></div>' +
                    '</div>' +

                    '<div class="card">' +
                        '<div class="card-title">Timestamps</div>' +
                        '<div class="row"><span class="label">T2 Timestamp</span><span class="val dim">' + (d.t2_timestamp || "\u2014") + '</span></div>' +
                        '<div class="row"><span class="label">RPi Timestamp</span><span class="val dim">' + (d.rpi_timestamp || d.timestamp || "\u2014") + '</span></div>' +
                    '</div>';

            } catch (err) {
                dot.className = "dot err";
                stxt.textContent = "Connection error";
                cards.innerHTML =
                    '<div class="card">' +
                    '<div class="card-title">Error</div>' +
                    '<div class="row"><span class="label">' + err + '</span></div>' +
                    '</div>';
            }
        }

        refresh();
        setInterval(refresh, 2000);
    </script>
</body>
</html>
