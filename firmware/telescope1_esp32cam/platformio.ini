; =============================================================
; PlatformIO Configuration — Telescope 1 (NodeMCU ESP8266)
; NodeMCU: IMU + VL53L0X + BPW34 photodiode + WiFi HTTP POST
; No FSO, no GPS
; =============================================================

[env:nodemcu]
platform = espressif8266
board = nodemcu
framework = arduino
monitor_speed = 115200

lib_deps =
    bolderflight/Bolder Flight Systems MPU9250 @ ^1.0.2
    pololu/VL53L0X @ ^1.3.1
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
