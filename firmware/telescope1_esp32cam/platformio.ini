; =============================================================
; PlatformIO Configuration — Telescope 1 (ESP32-CAM board)
; Used as regular ESP32: no camera, IMU + stepper + photodiode
;                        + VL53L0X + LoRa + WiFi/NTP
; =============================================================

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200

lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    bolderflight/Bolder Flight Systems MPU9250 @ ^1.0.2
    pololu/VL53L0X @ ^1.3.1
    bblanchon/ArduinoJson @ ^7.0.0
    arduino-libraries/NTPClient @ ^3.2.1

build_flags =
    -DCORE_DEBUG_LEVEL=3
