; =============================================================
; PlatformIO Configuration — Telescope 2 (ESP32 NodeMCU)
; Standard ESP32: IMU + stepper + photodiode + VL53L0X
;                 + GPS + FSO laser transmitter
; =============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bolderflight/Bolder Flight Systems MPU9250 @ ^1.0.2
    pololu/VL53L0X @ ^1.3.1
    bblanchon/ArduinoJson @ ^7.0.0
    mikalhart/TinyGPSPlus @ ^1.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
