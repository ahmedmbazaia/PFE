; =============================================================
; PlatformIO Configuration — Telescope 2 (TTGO LoRa32 V1)
; TTGO LoRa32: IMU + stepper + photodiode + VL53L0X
;              + GPS + FSO laser transmitter + LoRa
; =============================================================

[env:ttgo-lora32-v1]
platform = espressif32
board = ttgo-lora32-v1
framework = arduino
monitor_speed = 115200

lib_deps =
    bolderflight/Bolder Flight Systems MPU9250 @ ^1.0.2
    pololu/VL53L0X @ ^1.3.1
    bblanchon/ArduinoJson @ ^7.0.0
    mikalhart/TinyGPSPlus @ ^1.1.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DLORA_SCK=5
    -DLORA_MISO=19
    -DLORA_MOSI=27
    -DLORA_SS=18
    -DLORA_RST=14
    -DLORA_DIO0=26
